<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREDGE</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header id="header">
    <div class="header-inner">
      <a href="index.html" class="logo">CREDGE</a>
      <nav class="main-nav">
        <a href="index.html">Works</a>
        <a href="creators.html">Creators</a>
        <a href="index.html#brands-section">Brands</a>
        <a href="agencies.html">Agencies</a>
      </nav>
      <div class="header-actions">
        <button class="menu-toggle" id="menu-toggle" aria-label="Open menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ========== MOBILE MENU ========== -->
  <nav id="mobile-menu">
    <a href="index.html">Works</a>
    <a href="creators.html">Creators</a>
    <a href="index.html#brands-section">Brands</a>
    <a href="agencies.html">Agencies</a>
  </nav>

  <!-- ========== MAIN ========== -->
  <main id="agency-main">

    <!-- Agency Header -->
    <section id="agency-header-section" style="border-bottom:1px solid var(--border);padding:48px 0 40px;">
      <div class="container">
<div id="agency-header">
          <!-- Rendered by agency.js -->
        </div>
      </div>
    </section>

    <!-- Roster -->
    <section class="section" id="agency-roster-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Roster</h2>
        </div>
        <div class="creators-filters" id="roster-filters">
          <div class="creators-filter" id="roster-gender-filter">
            <button class="creators-filter-btn active" data-gender="all">All</button>
            <button class="creators-filter-btn" data-gender="m">Men</button>
            <button class="creators-filter-btn" data-gender="f">Women</button>
          </div>
          <div class="creators-filter" id="roster-division-filter" style="display:none;">
            <button class="creators-filter-btn active" data-division="all">All</button>
            <button class="creators-filter-btn" data-division="asian">Asian</button>
            <button class="creators-filter-btn" data-division="international">International</button>
          </div>
        </div>
        <div id="agency-roster-grid">
          <!-- Rendered by agency.js -->
        </div>
      </div>
    </section>

    <!-- Works -->
    <section class="section" id="agency-works-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Works</h2>
        </div>
        <div id="agency-works-grid">
          <!-- Rendered by agency.js -->
        </div>
      </div>
    </section>

  </main>

  <!-- ========== WORK MODAL ========== -->
  <div id="work-modal" aria-hidden="true">
    <div id="modal-backdrop"></div>
    <div class="modal-panel">
      <div id="modal-img"></div>
      <div class="modal-info" id="modal-info">
        <button id="modal-close" aria-label="Close">✕</button>
      </div>
    </div>
  </div>

  <!-- ========== FOOTER ========== -->
  <footer id="footer">
    <div class="container">
      <div class="footer-inner">
        <div>
          <div class="footer-logo">CREDGE</div>
        </div>
        <nav class="footer-links">
          <a href="#">About</a>
          <a href="#">Submit Work</a>
          <a href="#">Terms</a>
          <a href="#">Privacy</a>
          <a href="#">Contact</a>
        </nav>
      </div>
      <div class="footer-copy">© CREDGE. All rights reserved.</div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/agency.js"></script>
</body>
</html>
