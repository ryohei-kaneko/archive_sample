<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="日本ファッション制作アーカイブ — モデル、フォトグラファー、スタイリスト、ヘアメイク、ブランドLOOKの実績を横断して探せるクレジットデータベース。">
  <title>CREDGE</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== SEARCH OVERLAY ========== -->
  <div id="search-overlay" role="dialog" aria-label="作品を検索">
    <div class="search-box">
      <input
        id="search-input"
        type="text"
        placeholder="Search by brand, creator, keyword..."
        autocomplete="off"
        aria-label="Search"
      >
      <div class="search-hint">Press <kbd>ESC</kbd> to close</div>
    </div>
    <button id="btn-search-close" aria-label="検索を閉じる" style="position:absolute;top:24px;right:24px;color:#fff;font-size:24px;opacity:0.7;">✕</button>
  </div>

  <!-- ========== HEADER ========== -->
  <header id="header">
    <div class="header-inner">

      <a href="index.html" class="logo">
        CREDGE
      </a>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="#works-section" class="active">Works</a>
        <a href="#people-section">Creators</a>
        <a href="#brands-section">Brands</a>
        <a href="#agencies-section">Agencies</a>
      </nav>

      <div class="header-actions">
        <button id="btn-search-open" class="btn-search" aria-label="検索を開く" title="⌘K で検索">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="7" cy="7" r="5"/>
            <line x1="11" y1="11" x2="14.5" y2="14.5"/>
          </svg>
        </button>
        <button class="menu-toggle" id="menu-toggle" aria-label="メニューを開く" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>

    </div>
  </header>

  <!-- ========== MOBILE MENU ========== -->
  <nav id="mobile-menu" aria-label="Mobile navigation">
    <a href="#works-section">Works</a>
    <a href="#people-section">Creators</a>
    <a href="#brands-section">Brands</a>
    <a href="#agencies-section">Agencies</a>
  </nav>

  <!-- ========== HERO ========== -->
  <!-- ========== WORKS SECTION ========== -->
  <main>
    <section class="section" id="works-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Works</h2>
          <a href="#" class="section-link">View all →</a>
        </div>

        <div id="works-grid" role="list" aria-label="作品一覧">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>

    <!-- ========== PEOPLE SECTION ========== -->
    <section class="section" id="people-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Creators</h2>
          <a href="#" class="section-link">View all →</a>
        </div>
        <div id="people-grid" aria-label="クリエイター一覧">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>

    <!-- ========== BRANDS SECTION ========== -->
    <section class="section" id="brands-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Brands</h2>
          <a href="#" class="section-link">View all →</a>
        </div>
        <div id="brands-row" aria-label="ブランド一覧">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>

    <!-- ========== AGENCIES SECTION ========== -->
    <section class="section" id="agencies-section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Agencies</h2>
        </div>
        <div id="agencies-grid" aria-label="事務所一覧">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>

  </main>

  <!-- ========== FOOTER ========== -->
  <footer id="footer">
    <div class="container">
      <div class="footer-inner">
        <div>
          <div class="footer-logo">CREDGE</div>
          <div class="footer-tagline">Japan Fashion Production Credits</div>
        </div>
        <nav class="footer-links" aria-label="Footer navigation">
          <a href="#">About</a>
          <a href="#">Submit Work</a>
          <a href="#">Terms</a>
          <a href="#">Privacy</a>
          <a href="#">Contact</a>
        </nav>
      </div>
      <div class="footer-copy">© CREDGE. All rights reserved.</div>
    </div>
  </footer>

  <!-- ========== WORK MODAL ========== -->
  <div id="work-modal" aria-hidden="true">
    <div id="modal-backdrop"></div>
    <div class="modal-panel">
      <div id="modal-img"></div>
      <div class="modal-info" id="modal-info">
        <button id="modal-close" aria-label="Close">✕</button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div id="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
