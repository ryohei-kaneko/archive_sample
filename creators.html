<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creators — CREDGE</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header id="header">
    <div class="header-inner">
      <a href="index.html" class="logo">CREDGE</a>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Works</a>
        <a href="creators.html" class="active">Creators</a>
        <a href="index.html#brands-section">Brands</a>
        <a href="index.html#agencies-section">Agencies</a>
      </nav>
      <div class="header-actions">
        <button class="menu-toggle" id="menu-toggle" aria-label="メニューを開く" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ========== MOBILE MENU ========== -->
  <nav id="mobile-menu" aria-label="Mobile navigation">
    <a href="index.html">Works</a>
    <a href="creators.html">Creators</a>
    <a href="index.html#brands-section">Brands</a>
    <a href="index.html#agencies-section">Agencies</a>
  </nav>

  <!-- ========== MAIN ========== -->
  <main>
    <section class="section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Creators</h2>
        </div>
        <div class="creators-filters">
          <div class="creators-filter" id="role-filter">
            <button class="creators-filter-btn active" data-role="all">All</button>
            <button class="creators-filter-btn" data-role="model">Models</button>
            <button class="creators-filter-btn" data-role="photographer">Photographers</button>
            <button class="creators-filter-btn" data-role="stylist">Stylists</button>
            <button class="creators-filter-btn" data-role="hair_make">Hair / Make</button>
            <button class="creators-filter-btn" data-role="casting">Casting Directors</button>
            <button class="creators-filter-btn" data-role="set_designer">Set Designers</button>
            <button class="creators-filter-btn" data-role="art_director">Art Directors</button>
            <button class="creators-filter-btn" data-role="actor">Actors</button>
            <button class="creators-filter-btn" data-role="dancer">Dancers</button>
            <button class="creators-filter-btn" data-role="kid">Kids</button>
            <button class="creators-filter-btn" data-role="illustrator">Illustrator</button>
          </div>
          <div class="creators-filter" id="gender-filter">
            <button class="creators-filter-btn active" data-gender="all">All</button>
            <button class="creators-filter-btn" data-gender="m">Men</button>
            <button class="creators-filter-btn" data-gender="f">Women</button>
            <button class="creators-filter-btn" data-gender="nb">Non-Binary</button>
          </div>
          <div class="creators-filter" id="nationality-filter">
            <button class="creators-filter-btn active" data-nationality="all">All</button>
            <button class="creators-filter-btn" data-nationality="asian">Asian</button>
            <button class="creators-filter-btn" data-nationality="international">Mix / International</button>
          </div>
        </div>
        <div id="creators-grid">
          <!-- Rendered by JS -->
        </div>
      </div>
    </section>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer id="footer">
    <div class="container">
      <div class="footer-inner">
        <div>
          <div class="footer-logo">CREDGE</div>
        </div>
        <nav class="footer-links" aria-label="Footer navigation">
          <a href="#">About</a>
          <a href="#">Submit Work</a>
          <a href="#">Terms</a>
          <a href="#">Privacy</a>
          <a href="#">Contact</a>
        </nav>
      </div>
      <div class="footer-copy">© CREDGE. All rights reserved.</div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/creators.js"></script>
</body>
</html>
